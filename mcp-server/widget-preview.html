<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>TrailVerse MCP Widget Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Geist", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
    }

    h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      color: #22c55e;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .theme-toggle {
      text-align: center;
      margin-bottom: 24px;
    }

    .theme-toggle button {
      padding: 8px 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      margin: 0 4px;
      transition: all 0.2s;
    }

    .theme-toggle button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .theme-toggle button.active {
      background: #22c55e;
      color: #000;
      border-color: #22c55e;
    }

    .widget-section {
      max-width: 800px;
      margin: 0 auto 40px;
    }

    .widget-label {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .widget-label .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      font-weight: 500;
    }

    iframe {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: #0a0e0f;
    }

    .light-mode body,
    body.light {
      background: #f0ede8;
      color: #333;
    }

    body.light iframe {
      background: #fefcf9;
      border-color: rgba(0, 0, 0, 0.1);
    }

    body.light .widget-label {
      color: #333;
    }

    body.light .subtitle {
      color: rgba(0, 0, 0, 0.5);
    }

    body.light .theme-toggle button {
      border-color: rgba(0, 0, 0, 0.15);
      background: rgba(0, 0, 0, 0.03);
      color: #333;
    }
  </style>
</head>

<body>

  <p class="subtitle">Preview of all 5 ChatGPT App Store widgets with live data</p>

  <div class="theme-toggle">
    <button class="active" onclick="setTheme('dark')">Dark Mode</button>
    <button onclick="setTheme('light')">Light Mode</button>
  </div>

  <div class="widget-section">
    <div class="widget-label">Itinerary Widget <span class="badge">plan_trip</span></div>
    <iframe id="frame-itinerary" src="widgets/itinerary.html" height="700"></iframe>
  </div>

  <div class="widget-section">
    <div class="widget-label">Park Details Widget <span class="badge">get_park_details</span></div>
    <iframe id="frame-park-details" src="widgets/park-details.html" height="600"></iframe>
  </div>

  <div class="widget-section">
    <div class="widget-label">Compare Widget <span class="badge">compare_parks</span></div>
    <iframe id="frame-compare" src="widgets/compare.html" height="500"></iframe>
  </div>

  <div class="widget-section">
    <div class="widget-label">Park List Widget <span class="badge">search_parks</span></div>
    <iframe id="frame-park-list" src="widgets/park-list.html" height="500"></iframe>
  </div>

    <div class="widget-label">Events Widget <span class="badge">find_events</span></div>
    <iframe id="frame-events" src="widgets/events.html" height="500"></iframe>
  </div>

ionalparksexplorerusa.com/plan-ai?parks=zion,yose,grca" } };

    const PARK_LIST_DATA = { "kind": "park_list", "parks": [{ "parkCode": "yose", "name": "Yosemite National Park", "designation": "National Park", "states": "CA", "summary": "Not just a great valley, but a shrine to human foresight, the strength of granite, the power of glaciers, the persistence of life, and the tranquility of the High Sierra.", "heroImage": "https://www.nps.gov/common/uploads/structured_data/3C84CC4C-1DD8-B71B-0BE967E5E5D93F25.jpg", "rating": 4.9, "link": "https://www.nationalparksexplorerusa.com/parks/yose" }, { "parkCode": "jotr", "name": "Joshua Tree National Park", "designation": "National Park", "states": "CA", "summary": "Two distinct desert ecosystems, the Mojave and the Colorado, come together in Joshua Tree National Park. A fascinating variety of plants and animals make their homes in a land sculpted by strong winds and occasional torrents of rain.", "heroImage": "https://www.nps.gov/common/uploads/structured_data/306D0D08-1DD8-B71B-0B0ED12A16790C7A.jpg", "rating": 4.7, "link": "https://www.nationalparksexplorerusa.com/parks/jotr" }, { "parkCode": "chis", "name": "Channel Islands National Park", "designation": "National Park", "states": "CA", "summary": "Channel Islands National Park encompasses five remarkable islands and their ocean environment, preserving a wealth of natural and cultural resources.", "heroImage": "https://www.nps.gov/common/uploads/structured_data/8DE774D1-CB22-37F2-D826E3F0A73D303A.jpg", "rating": 4.8, "link": "https://www.nationalparksexplorerusa.com/parks/chis" }, { "parkCode": "depo", "name": "Devils Postpile National Monument", "designation": "National Monument", "states": "CA", "summary": "Established in 1911 by presidential proclamation, Devils Postpile National Monument protects and preserves the Devils Postpile formation, the 101-foot Rainbow Falls, and pristine mountain scenery.", "heroImage": "https://www.nps.gov/common/uploads/structured_data/3C7D873E-1DD8-B71B-0BF8E731254A9D7E.jpg", "rating": 4.5, "link":     // ── MCP Apps Bridge Simulator ──
    // Responds to iframe initialize requests with structuredContent data

    const widgetData = {
      "frame-itinerary": ITINERARY_DATA,
      "frame-park-details": PARK_DETAILS_DATA,
      "frame-compare": COMPARE_DATA,
      "frame-park-list": PARK_LIST_DATA,
      "frame-events": EVENTS_DATA,
    };

    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || msg.jsonrpc !== "2.0") return;

      // Find which iframe sent this message
      let sourceFrameId = null;
      for (const [id, _] of Object.entries(widgetData)) {
        const frame = document.getElementById(id);
        if (frame && event.source === frame.contentWindow) {
          sourceFrameId = id;
          break;
        }
      }
      if (!sourceFrameId) return;

      // Handle ui/initialize RPC
      if (msg.method === "ui/initialize" && typeof msg.id === "number") {
        const data = widgetData[sourceFrameId];
        const frame = document.getElementById(sourceFrameId);
        // Respond with the tool output
        frame.contentWindow.postMessage({
          jsonrpc: "2.0",
          id: msg.id,
          result: {
            toolOutput: {
              structuredContent: data
            }
          }
        }, "*");
      }
    });

    // ── Theme Toggle ──
    function setTheme(theme) {
      document.body.className = theme === 'light' ? 'light' : '';
      document.querySelectorAll('.theme-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(theme));
      });
      // Reload iframes to pick up prefers-color-scheme change
      // (widgets use @media prefers-color-scheme)
      if (theme === 'light') {
        document.querySelectorAll('iframe').forEach(f => {
          f.style.colorScheme = 'light';
        });
      } else {
        document.querySelectorAll('iframe').forEach(f => {
          f.style.colorScheme = 'dark';
        });
      }
    }
  </script>
