# Post-deploy SSR regression: first-response HTML vs route-tier expectations.
# PRs audit the Vercel preview URL when available; main uses production.

name: SSR route audit

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployment URL to audit (no trailing slash)
        required: false
        default: https://www.nationalparksexplorerusa.com
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ssr-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssr-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: next-frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd next-frontend && npm ci

      - name: Wait for Vercel preview (pull requests)
        if: github.event_name == 'pull_request'
        uses: patrickedigital/wait-for-vercel-preview@v1.0.9
        id: vercel-preview
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      - name: Resolve BASE_URL
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_URL: ${{ inputs.base_url }}
          VERCEL_URL: ${{ steps.vercel-preview.outputs.url }}
          VAR_URL: ${{ vars.SSR_AUDIT_BASE_URL }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_URL" ]; then
            URL="$DISPATCH_URL"
          elif [ "$EVENT_NAME" = "pull_request" ] && [ -n "$VERCEL_URL" ]; then
            URL="$VERCEL_URL"
          elif [ -n "$VAR_URL" ]; then
            URL="$VAR_URL"
          else
            URL="https://www.nationalparksexplorerusa.com"
          fi
          URL="${URL%/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Auditing: $URL"

      - name: Run SSR audit (strict)
        env:
          BASE_URL: ${{ steps.base.outputs.url }}
        run: cd next-frontend && npm run audit:ssr:strict
