name: TrailVerse
options:
  bundleIdPrefix: com.nationalparksexplorerusa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  TrailVerse:
    type: application
    platform: iOS
    sources:
      - path: TrailVerse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nationalparksexplorerusa.trailverse
        INFOPLIST_KEY_CFBundleDisplayName: TrailVerse
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.travel
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: TrailVerse uses your location to show nearby parks and estimate drive times during your trip.
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    entitlements:
      path: TrailVerse/Resources/TrailVerse.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:www.nationalparksexplorerusa.com
          - applinks:nationalparksexplorerusa.com

  TrailVerseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrailVerseTests
    dependencies:
      - target: TrailVerse

  TrailVerseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TrailVerseUITests
    dependencies:
      - target: TrailVerse

schemes:
  TrailVerse:
    build:
      targets:
        TrailVerse: all
        TrailVerseTests: [test]
        TrailVerseUITests: [test]
    run:
      config: Debug
    test:
      targets:
        - TrailVerseTests
        - TrailVerseUITests
